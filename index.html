<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#050807">
<title>RF Emitter Highlighter XR</title>
<script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
<script>
/* ============================================================
   RF Emitter Highlighter — tactical build v8
   - live DEMO SCALE (thumbstick): shrinks the WORLD, ranges stay true
   - fresnel rim glow (fake bloom, no postprocessing)
   - ground scan field
   - readable status strip (toggle with A/X)
   ============================================================ */
const CONFIG = {
  bg:'#050807', fogDensity:0.010,
  gazeFar:250, dwellMs:280, claimDwellMs:1400,
  scale: 0.18,          // starting world scale (1.0 = true metres)
  scaleMin: 0.04, scaleMax: 1.0,
  showStatus: true      // A/X toggles in-headset
};

const CLASSES = {
  controller: { name:'DRONE CONTROLLER', color:'#2dffa0' },
  enemy:      { name:'ENEMY DRONE',      color:'#ff5252' },
  walkie:     { name:'WALKIE TALKIE',    color:'#5a82ff' }
};
const CLAIM_COLOR = '#ffb454';

/* True field coordinates in metres. Never mutated by scale. */
const EMITTERS = [
  { id:'EMT-007', cls:'controller', confidence:0.79, pos:[ 14,0,-22], vel:[ 0.35,0,-0.20] },
  { id:'EMT-013', cls:'enemy',      confidence:0.88, pos:[-30,0,-30], vel:[-1.60,0, 0.90] },
  { id:'EMT-021', cls:'walkie',     confidence:0.64, pos:[ 40,0, -8], vel:[ 0.10,0, 0.15] },
  { id:'EMT-031', cls:'enemy',      confidence:0.81, pos:[-10,0, 26], vel:[ 0.60,0, 1.20] }
];

const COMPASS = ['N','NE','E','SE','S','SW','W','NW'];
const bearing = (vx,vz) => { let d = Math.atan2(vx,-vz)*180/Math.PI; return d<0 ? d+360 : d; };
const cardinal = d => COMPASS[Math.round(d/45)%8];

/* ---------- canvas panels ---------- */
function makeCanvasPanel(w, h, pxPerMeter) {
  pxPerMeter = pxPerMeter || 2200;
  const cv = document.createElement('canvas');
  cv.width  = Math.round(w * pxPerMeter);
  cv.height = Math.round(h * pxPerMeter);
  const ctx = cv.getContext('2d');
  const tex = new THREE.CanvasTexture(cv);
  tex.anisotropy = 16;
  tex.minFilter = THREE.LinearMipmapLinearFilter;
  tex.magFilter = THREE.LinearFilter;
  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(w, h),
    new THREE.MeshBasicMaterial({ map:tex, transparent:true, depthWrite:false, depthTest:false,
                                  fog:false, toneMapped:false })
  );
  mesh.renderOrder = 999;
  return { cv:cv, ctx:ctx, tex:tex, mesh:mesh, w:w, h:h };
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

/* ---------- animated energy beam ---------- */
function makeBeamMaterial(colorHex) {
  return new THREE.ShaderMaterial({
    transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, side:THREE.DoubleSide,
    uniforms: {
      uColor:{ value:new THREE.Color(colorHex) }, uTime:{ value:0 },
      uActive:{ value:0.0 }, uOpacity:{ value:0.9 }
    },
    vertexShader: [
      'varying vec2 vUv;',
      'void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }'
    ].join('\n'),
    fragmentShader: [
      'uniform vec3 uColor; uniform float uTime; uniform float uActive; uniform float uOpacity;',
      'varying vec2 vUv;',
      'void main(){',
      '  float fade = pow(1.0 - vUv.y, 1.5);',
      '  float bands = sin((vUv.y * 20.0) - uTime * 2.4);',
      '  bands = smoothstep(0.5, 1.0, bands) * 0.6;',
      '  float sweep = smoothstep(0.88, 1.0, sin((vUv.y * 3.0) - uTime * (2.0 + uActive * 5.0)));',
      '  float edge = sin(vUv.x * 3.14159);',
      '  float a = (fade * (0.32 + bands + sweep * 0.8)) * edge;',
      '  a *= uOpacity * (0.55 + uActive * 0.8);',
      '  gl_FragColor = vec4(uColor * (1.0 + uActive * 0.7), a);',
      '}'
    ].join('\n')
  });
}

/* ---------- fresnel rim glow (fake bloom, one cheap shader) ---------- */
function makeFresnelMaterial(colorHex) {
  return new THREE.ShaderMaterial({
    transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, side:THREE.FrontSide,
    uniforms: {
      uColor:{ value:new THREE.Color(colorHex) }, uTime:{ value:0 },
      uActive:{ value:0.0 }, uPower:{ value:2.6 }
    },
    vertexShader: [
      'varying vec3 vN; varying vec3 vV;',
      'void main(){',
      '  vec4 mv = modelViewMatrix * vec4(position,1.0);',
      '  vN = normalize(normalMatrix * normal);',
      '  vV = normalize(-mv.xyz);',
      '  gl_Position = projectionMatrix * mv;',
      '}'
    ].join('\n'),
    fragmentShader: [
      'uniform vec3 uColor; uniform float uTime; uniform float uActive; uniform float uPower;',
      'varying vec3 vN; varying vec3 vV;',
      'void main(){',
      // rim = bright where surface faces away from viewer
      '  float rim = 1.0 - max(dot(normalize(vN), normalize(vV)), 0.0);',
      '  rim = pow(rim, uPower);',
      '  float pulse = 0.85 + 0.15 * sin(uTime * 2.0);',
      '  float a = rim * pulse * (0.75 + uActive * 0.8);',
      '  gl_FragColor = vec4(uColor * (1.3 + uActive * 0.8), a);',
      '}'
    ].join('\n')
  });
}

/* ---------- ground scan field: expanding rings + grid pulse ---------- */
function makeScanMaterial() {
  return new THREE.ShaderMaterial({
    transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, side:THREE.DoubleSide,
    uniforms: { uColor:{ value:new THREE.Color('#2dffa0') }, uTime:{ value:0 } },
    vertexShader: [
      'varying vec2 vUv;',
      'void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }'
    ].join('\n'),
    fragmentShader: [
      'uniform vec3 uColor; uniform float uTime;',
      'varying vec2 vUv;',
      'void main(){',
      '  vec2 p = vUv - 0.5;',
      '  float r = length(p) * 2.0;',
      '  if (r > 1.0) discard;',
      // expanding scan rings
      '  float ring = sin(r * 26.0 - uTime * 1.6);',
      '  ring = smoothstep(0.86, 1.0, ring) * 0.5;',
      // faint tactical grid
      '  vec2 g = abs(fract(vUv * 26.0) - 0.5);',
      '  float grid = smoothstep(0.46, 0.5, max(g.x, g.y)) * 0.10;',
      // radar sweep arm
      '  float ang = atan(p.y, p.x);',
      '  float sweep = smoothstep(0.90, 1.0, cos(ang - uTime * 0.7));',
      '  sweep *= (1.0 - r) * 0.35;',
      '  float falloff = pow(1.0 - r, 1.4);',
      '  float a = (ring + grid + sweep) * falloff * 0.55;',
      '  gl_FragColor = vec4(uColor, a);',
      '}'
    ].join('\n')
  });
}

/* ============================================================
   XR session manager
   ============================================================ */
AFRAME.registerComponent('xr-launcher', {
  init: function () {
    const self = this;
    this.renderer = null;
    this.bgc = new THREE.Color(CONFIG.bg);
    this.fog = new THREE.FogExp2(this.bgc.getHex(), CONFIG.fogDensity);
    this.arBtn = document.getElementById('btn-ar');
    this.vrBtn = document.getElementById('btn-vr');
    this.diag  = document.getElementById('diag');
    this.setWorld(true);
    const ready = () => { self.renderer = self.el.renderer; self.probe(); };
    if (this.el.renderer) ready(); else this.el.addEventListener('loaded', ready);
    this.arBtn.addEventListener('click', () => self.enter('immersive-ar'));
    this.vrBtn.addEventListener('click', () => self.enter('immersive-vr'));
    this.el.addEventListener('exit-vr', () => {
      document.body.classList.remove('in-xr');
      if (window.RFX) window.RFX.isAR = false;
      self.setWorld(true);
    });
  },
  probe: function () {
    const self = this;
    if (!navigator.xr) {
      this.diag.innerHTML = 'navigator.xr MISSING — not a WebXR browser / insecure origin';
      this.diag.className = 'bad'; return;
    }
    Promise.all([
      navigator.xr.isSessionSupported('immersive-ar').catch(()=>false),
      navigator.xr.isSessionSupported('immersive-vr').catch(()=>false)
    ]).then(([ar, vr]) => {
      self.arBtn.disabled = !ar; self.vrBtn.disabled = !vr;
      self.arBtn.classList.toggle('on', ar); self.vrBtn.classList.toggle('on', vr);
      self.diag.innerHTML =
        'immersive-ar: <b>' + (ar?'YES':'NO') + '</b> &nbsp; immersive-vr: <b>' + (vr?'YES':'NO') + '</b>' +
        (ar ? '<br>tap ENTER MIXED REALITY for passthrough'
            : '<br>no passthrough — use the standalone Meta Quest Browser (not Link)');
      self.diag.className = ar ? 'ok' : 'warn';
    });
  },
  enter: function (mode) {
    const self = this;
    if (!navigator.xr || !this.renderer) return;
    const isAR = mode === 'immersive-ar';
    const opts = isAR
      ? { requiredFeatures:['local-floor'], optionalFeatures:['bounded-floor','hand-tracking','anchors'] }
      : { requiredFeatures:['local-floor'], optionalFeatures:['bounded-floor','hand-tracking'] };
    navigator.xr.requestSession(mode, opts).then((session) => {
      self.setWorld(!isAR);
      if (window.RFX) window.RFX.isAR = isAR;
      self.renderer.xr.setReferenceSpaceType('local-floor');
      self.renderer.xr.setSession(session).then(() => document.body.classList.add('in-xr'));
      session.addEventListener('end', () => {
        document.body.classList.remove('in-xr');
        if (window.RFX) window.RFX.isAR = false;
        self.setWorld(true);
      });
    }).catch((err) => {
      self.diag.innerHTML = 'session failed: ' + (err && err.message ? err.message : err);
      self.diag.className = 'bad';
    });
  },
  setWorld: function (isDark) {
    const g = this.el.querySelector('#ground'), gr = this.el.querySelector('#grid');
    if (g)  g.setAttribute('visible', isDark);
    if (gr) gr.setAttribute('visible', isDark);
    this.el.object3D.background = isDark ? this.bgc : null;
    this.el.object3D.fog        = isDark ? this.fog : null;
    const r = this.el.renderer;
    if (r) { r.setClearColor(isDark ? this.bgc.getHex() : 0x000000, isDark ? 1 : 0); r.setClearAlpha(isDark ? 1 : 0); }
    document.body.style.background = isDark ? CONFIG.bg : 'transparent';
  }
});

/* ============================================================
   anchor-lock. Anchor creation is already single-shot: it only
   runs when recenter is requested, or when no anchor exists yet.
   Reading the pose every frame is the anchor WORKING (the runtime
   drift-corrects it) — not an overwrite.
   ============================================================ */
AFRAME.registerComponent('anchor-lock', {
  init: function () {
    this.anchor = null; this.pending = false; this.recenterFlag = false;
    this.world = this.el.object3D; this._q = new THREE.Quaternion();
    this.lastPoseOK = false; this.anchorCount = 0;
    this.anchorPos = new THREE.Vector3();
  },
  requestRecenter: function () { this.recenterFlag = true; },
  _makeAnchor: function (frame, refSpace, xform) {
    const self = this, old = this.anchor;
    this.pending = true;
    try {
      frame.createAnchor(xform, refSpace).then(function (a) {
        if (old && old.delete) { try { old.delete(); } catch (e) {} }
        self.anchor = a; self.pending = false; self.anchorCount++;
        if (window.RFX) window.RFX.anchored = true;
      }).catch(function () { self.pending = false; });
    } catch (e) { self.pending = false; }
  },
  tick: function () {
    const S = window.RFX;
    if (!S || !S.isAR) return;
    const scene = this.el.sceneEl, frame = scene.frame, r = scene.renderer;
    if (!frame || !r || !r.xr || !frame.createAnchor) return;
    const refSpace = r.xr.getReferenceSpace();
    if (!refSpace) return;
    if (this.recenterFlag) {
      this.recenterFlag = false;
      const vp = frame.getViewerPose(refSpace);
      if (vp) {
        const t = vp.transform;
        this._q.set(t.orientation.x, t.orientation.y, t.orientation.z, t.orientation.w);
        const e = new THREE.Euler().setFromQuaternion(this._q, 'YXZ');
        const yq = new THREE.Quaternion().setFromEuler(new THREE.Euler(0, e.y, 0));
        this._makeAnchor(frame, refSpace, new XRRigidTransform(
          { x:t.position.x, y:0, z:t.position.z },
          { x:yq.x, y:yq.y, z:yq.z, w:yq.w }));
      }
    }
    if (!this.anchor && !this.pending) this._makeAnchor(frame, refSpace, new XRRigidTransform());
    if (this.anchor) {
      const pose = frame.getPose(this.anchor.anchorSpace, refSpace);
      this.lastPoseOK = !!pose;
      if (pose) {
        const p = pose.transform.position, o = pose.transform.orientation;
        this.world.position.set(p.x, p.y, p.z);
        this.world.quaternion.set(o.x, o.y, o.z, o.w);
        this.anchorPos.set(p.x, p.y, p.z);
      }
    } else {
      this.lastPoseOK = false;
    }
  }
});

/* ---------- world scale: independent of anchoring, always applied ----------
   Scales the WORLD only. Emitter coordinates stay true metres, so the HUD
   keeps reporting real ranges — the layout shrinks, the data doesn't lie. */
AFRAME.registerComponent('world-scale', {
  tick: function () {
    const S = window.RFX;
    if (!S) return;
    const s = S.scale;
    const o = this.el.object3D;
    if (o.scale.x !== s) o.scale.set(s, s, s);
  }
});

/* ============================================================
   Emitter marker
   ============================================================ */
AFRAME.registerComponent('rf-emitter', {
  schema: { idx:{type:'int', default:0} },
  init: function () {
    const e = this.e = EMITTERS[this.data.idx];
    this.baseColor = CLASSES[e.cls].color;
    this.claimed = false;
    const root = this.el.object3D;
    const c3 = new THREE.Color(this.baseColor);

    this.beamMat = makeBeamMaterial(this.baseColor);
    this.beam = new THREE.Mesh(new THREE.CylinderGeometry(0.34,0.34,30,12,1,true), this.beamMat);
    this.beam.position.y = 15; root.add(this.beam);

    const add = (o) => new THREE.MeshBasicMaterial({
      color:c3, transparent:true, opacity:o, fog:false, depthWrite:false,
      toneMapped:false, blending:THREE.AdditiveBlending });

    this.ring = new THREE.Mesh(new THREE.RingGeometry(1.15,1.45,44), add(0.85));
    this.ring.material.side = THREE.DoubleSide;
    this.ring.rotation.x = -Math.PI/2; this.ring.position.y = 0.03; root.add(this.ring);
    this.pulse = new THREE.Mesh(new THREE.RingGeometry(0.8,1.0,44), add(0.6));
    this.pulse.material.side = THREE.DoubleSide;
    this.pulse.rotation.x = -Math.PI/2; this.pulse.position.y = 0.05; root.add(this.pulse);

    // solid core (raycast target)
    this.orb = new THREE.Mesh(new THREE.SphereGeometry(0.62,22,18),
      new THREE.MeshBasicMaterial({ color:c3, fog:false, toneMapped:false }));
    this.orb.position.y = 2.6; root.add(this.orb);

    // fresnel rim shell — fake bloom, makes it emit light into the room
    this.rimMat = makeFresnelMaterial(this.baseColor);
    this.rim = new THREE.Mesh(new THREE.SphereGeometry(0.95,24,18), this.rimMat);
    this.rim.position.y = 2.6; root.add(this.rim);

    this.shell = new THREE.Mesh(new THREE.IcosahedronGeometry(1.25, 1),
      new THREE.MeshBasicMaterial({ color:c3, wireframe:true, transparent:true,
        opacity:0.30, fog:false, toneMapped:false, blending:THREE.AdditiveBlending }));
    this.shell.position.y = 2.6; root.add(this.shell);

    this.claimRing = new THREE.Mesh(new THREE.TorusGeometry(1.5, 0.07, 8, 40),
      new THREE.MeshBasicMaterial({ color:new THREE.Color(CLAIM_COLOR), transparent:true,
        opacity:0.9, fog:false, toneMapped:false, blending:THREE.AdditiveBlending }));
    this.claimRing.rotation.x = -Math.PI/2; this.claimRing.position.y = 0.12;
    this.claimRing.visible = false; root.add(this.claimRing);

    this.phase = Math.random()*1800;
    this.focused = false;
  },
  setFocused: function (f) {
    if (this.focused === f) return;
    this.focused = f;
    this.beamMat.uniforms.uActive.value = f ? 1.0 : 0.0;
    this.rimMat.uniforms.uActive.value = f ? 1.0 : 0.0;
    this.orb.scale.setScalar(f ? 1.25 : 1.0);
    this.shell.material.opacity = f ? 0.7 : 0.30;
  },
  toggleClaim: function () {
    this.claimed = !this.claimed;
    this.claimRing.visible = this.claimed;
    const c = new THREE.Color(this.claimed ? CLAIM_COLOR : this.baseColor);
    this.beamMat.uniforms.uColor.value.copy(c);
    this.rimMat.uniforms.uColor.value.copy(c);
    this.orb.material.color.copy(c);
    this.shell.material.color.copy(c);
    this.ring.material.color.copy(c);
    this.pulse.material.color.copy(c);
    return this.claimed;
  },
  currentColor: function () { return this.claimed ? CLAIM_COLOR : this.baseColor; },
  tick: function (time, dt) {
    const S = window.RFX;
    if (!S) return;
    const e = this.e, root = this.el.object3D;
    const step = Math.min(dt || 16, 50) / 1000;
    if (S.playing) {
      e.pos[0] += e.vel[0] * step * S.speed;
      e.pos[2] += e.vel[2] * step * S.speed;
      e.vel[0] += Math.sin(time*0.0005 + this.phase)*0.02*step;
      e.vel[2] += Math.cos(time*0.0004 + this.phase)*0.02*step;
      if (Math.hypot(e.pos[0], e.pos[2]) > 75) { e.vel[0]*=-1; e.vel[2]*=-1; }
      root.position.set(e.pos[0], 0, e.pos[2]);
    }
    const ts = time * 0.001;
    this.beamMat.uniforms.uTime.value = ts;
    this.rimMat.uniforms.uTime.value = ts;
    this.beam.visible = S.beams;
    const t = ((time + this.phase) % 1800) / 1800;
    const s = 1 + t*4.0;
    this.pulse.scale.set(s,1,s);
    this.pulse.material.opacity = 0.6 * (1 - t);
    const bob = 2.6 + Math.sin(time*0.0015 + this.phase)*0.10;
    this.orb.position.y = this.rim.position.y = this.shell.position.y = bob;
    this.shell.rotation.y += step * (this.focused ? 1.1 : 0.35);
    this.shell.rotation.x += step * 0.15;
    if (this.claimed) {
      this.claimRing.rotation.z += step * 0.8;
      this.claimRing.material.opacity = 0.65 + Math.sin(time*0.004)*0.25;
    }
  }
});

/* ---------- ground scan field ---------- */
AFRAME.registerComponent('scan-field', {
  init: function () {
    this.mat = makeScanMaterial();
    const m = new THREE.Mesh(new THREE.PlaneGeometry(160,160), this.mat);
    m.rotation.x = -Math.PI/2; m.position.y = 0.01;
    this.el.setObject3D('scan', m);
  },
  tick: function (time) { this.mat.uniforms.uTime.value = time * 0.001; }
});

/* ============================================================
   Gaze + claim
   ============================================================ */
AFRAME.registerComponent('gaze-picker', {
  init: function () {
    const self = this;
    this.ray = new THREE.Raycaster(); this.ray.far = CONFIG.gazeFar;
    this.origin = new THREE.Vector3(); this.dir = new THREE.Vector3();
    this.current = null; this.candidate = null; this.since = 0;
    this.claimArmed = 0; this.comps = []; this.orbs = [];
    this.el.addEventListener('targets-ready', function () {
      self.comps = Array.prototype.map.call(document.querySelectorAll('[rf-emitter]'),
        function (el) { return el.components['rf-emitter']; });
      self.orbs = self.comps.map(function (c) { return c.orb; });
    });
    ['triggerdown'].forEach(function (evt) {
      self.el.addEventListener(evt, function () { self.claim(); });
    });
  },
  claim: function () {
    if (!this.current) return;
    const on = this.current.toggleClaim();
    const hud = document.querySelector('#gaze-hud');
    if (hud && hud.components['gaze-hud']) hud.components['gaze-hud'].flash(on);
    this.claimArmed = 0;
  },
  tick: function (time, dt) {
    const cam = this.el.camera;
    if (!cam || !this.orbs.length) return;
    cam.getWorldPosition(this.origin);
    cam.getWorldDirection(this.dir);
    this.ray.set(this.origin, this.dir);
    const hits = this.ray.intersectObjects(this.orbs, false);
    let comp = null;
    if (hits.length) {
      const obj = hits[0].object;
      for (let i=0;i<this.comps.length;i++) if (this.comps[i].orb === obj) { comp = this.comps[i]; break; }
    }
    if (comp !== this.candidate) { this.candidate = comp; this.since = time; this.claimArmed = 0; }
    if (comp && (time - this.since > CONFIG.dwellMs) && comp !== this.current) {
      if (this.current) this.current.setFocused(false);
      comp.setFocused(true); this.current = comp; this.claimArmed = 0;
    }
    if (!comp && this.current) { this.current.setFocused(false); this.current = null; this.claimArmed = 0; }
    if (this.current && comp === this.current) {
      this.claimArmed += (dt || 16);
      if (this.claimArmed > CONFIG.claimDwellMs + CONFIG.dwellMs) this.claim();
    }
    window.RFX.gazed = this.current;
    window.RFX.claimProgress = this.current
      ? Math.min(1, Math.max(0, (this.claimArmed - CONFIG.dwellMs) / CONFIG.claimDwellMs)) : 0;
  }
});

/* ============================================================
   Contextual HUD — head-locked, low, tilted up toward the eye.
   ============================================================ */
AFRAME.registerComponent('gaze-hud', {
  init: function () {
    this.panel = makeCanvasPanel(0.46, 0.26, 2200);
    this.panel.mesh.visible = false;
    this.el.object3D.add(this.panel.mesh);
    this.flashT = 0; this.flashOn = false; this.last = 0;
    this.v = new THREE.Vector3(); this.w = new THREE.Vector3();
  },
  flash: function (on) { this.flashT = 900; this.flashOn = on; },
  tick: function (time, dt) {
    const S = window.RFX;
    if (!S) return;
    if (this.flashT > 0) this.flashT -= (dt || 16);
    const g = S.gazed;
    this.panel.mesh.visible = !!g || this.flashT > 0;
    if (!this.panel.mesh.visible) return;
    if (time - this.last < 90) return;
    this.last = time;
    if (g) this.draw(g, S.claimProgress, time);
  },
  draw: function (g, prog, time) {
    const e = g.e, color = g.currentColor();
    const ctx = this.panel.ctx, cv = this.panel.cv, W = cv.width, H = cv.height;
    // TRUE range in metres: measured in the emitter's own (unscaled) space
    const range = Math.hypot(e.pos[0], e.pos[2]);
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = 'rgba(2,10,7,0.92)';
    roundRect(ctx,4,4,W-8,H-8,18); ctx.fill();
    ctx.strokeStyle = color; ctx.lineWidth = 6; ctx.stroke();
    ctx.textBaseline='middle';
    ctx.fillStyle = color; ctx.textAlign='left';
    ctx.font = 'bold ' + Math.round(H*0.155) + 'px ui-monospace, monospace';
    ctx.fillText(e.id, W*0.055, H*0.16);
    ctx.textAlign='right';
    ctx.fillText(Math.round(e.confidence*100) + '%', W*0.945, H*0.16);
    ctx.strokeStyle = color; ctx.globalAlpha=0.4; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(W*0.055,H*0.27); ctx.lineTo(W*0.945,H*0.27); ctx.stroke();
    ctx.globalAlpha=1;
    ctx.fillStyle = g.claimed ? CLAIM_COLOR : '#eafff6'; ctx.textAlign='left';
    ctx.font = 'bold ' + Math.round(H*0.115) + 'px ui-monospace, monospace';
    ctx.fillText(g.claimed ? 'HANDLED \u2713' : CLASSES[e.cls].name, W*0.055, H*0.40);
    const hd = bearing(e.vel[0], e.vel[2]);
    const cols = [
      ['RANGE', Math.round(range) + 'm'],
      ['SPEED', Math.hypot(e.vel[0],e.vel[2]).toFixed(1)],
      ['BRG',   Math.round(hd) + '\u00b0' + cardinal(hd)]
    ];
    for (let i=0;i<3;i++){
      const x = W*(0.19 + i*0.31);
      ctx.textAlign='center';
      ctx.fillStyle='#7fae9c'; ctx.font = Math.round(H*0.082) + 'px ui-monospace, monospace';
      ctx.fillText(cols[i][0], x, H*0.585);
      ctx.fillStyle='#eafff6'; ctx.font='bold ' + Math.round(H*0.135) + 'px ui-monospace, monospace';
      ctx.fillText(cols[i][1], x, H*0.72);
    }
    const by = H*0.87, bh = H*0.075, bx = W*0.055, bw = W*0.89;
    ctx.fillStyle='rgba(255,255,255,0.10)';
    roundRect(ctx,bx,by-bh/2,bw,bh,bh/2); ctx.fill();
    if (this.flashT > 0) {
      ctx.fillStyle = this.flashOn ? CLAIM_COLOR : '#7fae9c';
      roundRect(ctx,bx,by-bh/2,bw,bh,bh/2); ctx.fill();
      ctx.fillStyle='#02120c'; ctx.textAlign='center';
      ctx.font='bold ' + Math.round(H*0.072) + 'px ui-monospace, monospace';
      ctx.fillText(this.flashOn ? 'CLAIMED' : 'RELEASED', W/2, by);
    } else if (prog > 0.01) {
      ctx.fillStyle = CLAIM_COLOR;
      roundRect(ctx,bx,by-bh/2,Math.max(bh,bw*prog),bh,bh/2); ctx.fill();
      ctx.fillStyle='#7fae9c'; ctx.textAlign='center';
      ctx.font=Math.round(H*0.068) + 'px ui-monospace, monospace';
      ctx.fillText('HOLD GAZE TO ' + (g.claimed ? 'RELEASE' : 'CLAIM'), W/2, by - bh);
    } else {
      ctx.fillStyle='#5c7d70'; ctx.textAlign='center';
      ctx.font=Math.round(H*0.068) + 'px ui-monospace, monospace';
      ctx.fillText('TRIGGER OR HOLD GAZE TO ' + (g.claimed ? 'RELEASE' : 'CLAIM'), W/2, by);
    }
    this.panel.tex.needsUpdate = true;
  }
});

/* ============================================================
   Status strip — big, centred, unmissable. A/X toggles.
   ============================================================ */
AFRAME.registerComponent('status-hud', {
  init: function () {
    this.panel = makeCanvasPanel(0.50, 0.105, 2400);
    this.el.object3D.add(this.panel.mesh);
    this.v = new THREE.Vector3(); this.last = 0;
    this._iq = new THREE.Quaternion();
  },
  tick: function (time) {
    const S = window.RFX;
    if (!S) return;
    this.panel.mesh.visible = !!S.showStatus;
    if (!S.showStatus) return;
    if (time - this.last < 180) return;
    this.last = time;
    const cam = this.el.sceneEl.camera;
    const worldEl = document.querySelector('#world');
    const al = worldEl && worldEl.components['anchor-lock'];
    let hx='--', hz='--', anchor='OFF', track='\u2014', n=0;
    if (cam && worldEl) {
      // head position in the ANCHOR frame, independent of demo scale:
      // undo translation+rotation only, never the scale factor.
      cam.getWorldPosition(this.v);
      this.v.sub(worldEl.object3D.position);
      this._iq.copy(worldEl.object3D.quaternion).invert();
      this.v.applyQuaternion(this._iq);
      hx = this.v.x.toFixed(2); hz = this.v.z.toFixed(2);
    }
    if (al) {
      anchor = al.anchor ? 'LOCKED' : (S.isAR ? 'PENDING' : 'OFF');
      track  = al.lastPoseOK ? 'OK' : (al.anchor ? 'LOST' : '\u2014');
      n = al.anchorCount;
    }
    this.draw(anchor, track, hx, hz, n, S.scale);
  },
  draw: function (anchor, track, hx, hz, n, scale) {
    const ctx=this.panel.ctx, cv=this.panel.cv, W=cv.width, H=cv.height;
    const good = anchor==='LOCKED' && track==='OK';
    const col = good ? '#2dffa0' : (anchor==='PENDING' ? '#ffb454' : '#ff5252');
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='rgba(2,10,7,0.90)';
    roundRect(ctx,3,3,W-6,H-6,12); ctx.fill();
    ctx.strokeStyle=col; ctx.lineWidth=4; ctx.stroke();
    ctx.textBaseline='middle';
    ctx.textAlign='left'; ctx.fillStyle=col;
    ctx.font='bold ' + Math.round(H*0.30) + 'px ui-monospace, monospace';
    ctx.fillText('ANCHOR ' + anchor, W*0.03, H*0.32);
    ctx.fillStyle = track==='OK' ? '#2dffa0' : '#ff5252';
    ctx.font='bold ' + Math.round(H*0.24) + 'px ui-monospace, monospace';
    ctx.textAlign='right';
    ctx.fillText('TRK ' + track + '  x' + n, W*0.97, H*0.32);
    // the number that proves anchoring: head pos in anchored frame
    ctx.textAlign='left'; ctx.fillStyle='#eafff6';
    ctx.font='bold ' + Math.round(H*0.30) + 'px ui-monospace, monospace';
    ctx.fillText('HEAD ' + hx + ' / ' + hz + ' m', W*0.03, H*0.72);
    ctx.textAlign='right'; ctx.fillStyle='#39e0ff';
    ctx.font='bold ' + Math.round(H*0.26) + 'px ui-monospace, monospace';
    ctx.fillText('SCALE 1:' + Math.round(1/scale), W*0.97, H*0.72);
    this.panel.tex.needsUpdate = true;
  }
});

AFRAME.registerComponent('tactical-grid', {
  init: function () {
    const g = new THREE.GridHelper(300,120, new THREE.Color('#1c6a4f'), new THREE.Color('#0c2f23'));
    g.material.transparent = true; g.material.opacity = 0.45; g.material.depthWrite = false;
    this.el.setObject3D('grid', g);
  }
});

/* ---------- controller input: recenter, scale, status toggle ---------- */
AFRAME.registerComponent('xr-input', {
  init: function () {
    const self = this;
    // grip / B / Y -> recenter
    ['gripdown','bbuttondown','ybuttondown'].forEach(function (evt) {
      self.el.addEventListener(evt, function () {
        const w = document.querySelector('#world');
        const c = w && w.components['anchor-lock'];
        if (c) c.requestRecenter();
      });
    });
    // A / X -> toggle status strip
    ['abuttondown','xbuttondown'].forEach(function (evt) {
      self.el.addEventListener(evt, function () {
        if (window.RFX) window.RFX.showStatus = !window.RFX.showStatus;
      });
    });
    // thumbstick Y -> live world scale
    this.el.addEventListener('thumbstickmoved', function (e) {
      const S = window.RFX;
      if (!S || !e.detail) return;
      const y = e.detail.y;
      if (Math.abs(y) < 0.15) return;
      const f = 1 - y * 0.035;      // push up = shrink, pull down = grow
      S.scale = Math.min(CONFIG.scaleMax, Math.max(CONFIG.scaleMin, S.scale * f));
    });
  }
});

AFRAME.registerComponent('emitter-source', {
  init: function () {
    const self = this;
    window.RFX = {
      playing:true, speed:1, beams:true, isAR:false, anchored:false,
      gazed:null, claimProgress:0, scale:CONFIG.scale, showStatus:CONFIG.showStatus,
      home: EMITTERS.map(function (e) { return { pos:e.pos.slice(), vel:e.vel.slice() }; })
    };
    EMITTERS.forEach(function (e,i) {
      const el = document.createElement('a-entity');
      el.setAttribute('position', e.pos[0] + ' 0 ' + e.pos[2]);
      el.setAttribute('rf-emitter', 'idx: ' + i);
      self.el.appendChild(el);
    });
    setTimeout(function(){ self.el.sceneEl.emit('targets-ready'); }, 400);
  }
});
</script>

<style>
  html,body{margin:0;width:100%;height:100%;background:#050807;font-family:ui-monospace,Menlo,Consolas,monospace;overflow:hidden}
  #overlay{position:fixed;left:16px;top:16px;z-index:6;color:#2dffa0;background:rgba(4,16,12,.9);
    border:1px solid rgba(45,255,160,.4);padding:14px 16px;border-radius:9px;max-width:360px}
  #overlay h1{margin:0 0 4px;font-size:14px;letter-spacing:1.5px}
  #overlay p{margin:0 0 12px;font-size:11px;color:#7fae9c;line-height:1.65}
  .btns{display:flex;gap:8px;margin-bottom:10px}

  .btns button:disabled{opacity:.35;border-color:#3a5b50;color:#5c7d70;cursor:not-allowed}

</style>
</head>

<body>
<div id="overlay">
  <h1>RF EMITTER HIGHLIGHTER</h1>
  <p>Standalone Meta Quest Browser &mdash; not over Link.<br>
     <b>Gaze</b> a beacon for details &middot; <b>trigger</b> or hold gaze to CLAIM<br>
     <b>Thumbstick up/down</b> scale world &middot; <b>grip/B/Y</b> recenter &middot; <b>A/X</b> hide status</p>
  <div class="btns">
    <button id="btn-ar" disabled>ENTER MIXED REALITY</button>
    <button id="btn-vr" disabled>ENTER VR</button>
  </div>
  <div id="diag">checking XR support&hellip;</div>
</div>

<a-scene
  vr-mode-ui="enabled: false"
  webxr="referenceSpaceType: local-floor; optionalFeatures: local-floor, bounded-floor, hand-tracking, anchors"
  renderer="antialias: true; foveationLevel: 1; colorManagement: true; alpha: true"
  xr-launcher gaze-picker>

  <a-entity light="type: ambient; color:#668877; intensity:0.9"></a-entity>

  <a-plane id="ground" rotation="-90 0 0" width="300" height="300" color="#07110d" material="shader:flat"></a-plane>
  <a-entity id="grid" tactical-grid></a-entity>

  <!-- anchored + scaled world -->
  <a-entity id="world" anchor-lock world-scale emitter-source>
    <a-entity scan-field></a-entity>
  </a-entity>

  <a-entity id="rig">
    <a-camera id="head" position="0 1.7 0" look-controls="pointerLockEnabled:false" wasd-controls="enabled:false">
      <a-ring id="reticle" position="0 -0.02 -1.2" radius-inner="0.005" radius-outer="0.009"
        color="#2dffa0" material="shader:flat; fog:false"></a-ring>
      <!-- info box: low, tilted up toward the eye -->
      <a-entity id="gaze-hud" gaze-hud position="0 -0.30 -0.70" rotation="14 0 0"></a-entity>
      <!-- status: below it, same tilt, unmissable -->
      <a-entity status-hud position="0 -0.45 -0.68" rotation="20 0 0"></a-entity>
    </a-camera>
    <a-entity laser-controls="hand:left"  xr-input></a-entity>
    <a-entity laser-controls="hand:right" xr-input></a-entity>
  </a-entity>
</a-scene>
