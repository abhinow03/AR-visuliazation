/* ============================================================
   RF Emitter Highlighter — tactical build v14
   - formations generated parametrically (ported 1:1 from the
     capstone's get_formation_offsets/generate_transition_sequence),
     no CSV/data file dependency anymore
   - user-selectable formation with a live cosine-blend fly-to,

     plain mouse/touch click — one interaction model everywhere

const COMPASS = ['N','NE','E','SE','S','SW','W','NW'];
const bearing = (vx,vz) => { let d = Math.atan2(vx,-vz)*180/Math.PI; return d<0 ? d+360 : d; };
const cardinal = d => COMPASS[Math.round(d/45)%8];
const clamp = (v,a,b) => Math.min(b, Math.max(a, v));

function makeCanvasPanel(w, h, pxPerMeter) {
  pxPerMeter = pxPerMeter || 2200;
  const cv = document.createElement('canvas');
  cv.width  = Math.round(w * pxPerMeter);
  cv.height = Math.round(h * pxPerMeter);
  const ctx = cv.getContext('2d');
  const tex = new THREE.CanvasTexture(cv);
  tex.anisotropy = 16;
  tex.minFilter = THREE.LinearMipmapLinearFilter;
  tex.magFilter = THREE.LinearFilter;
  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(w, h),
    new THREE.MeshBasicMaterial({ map:tex, transparent:true, depthWrite:false, depthTest:false,
                                  fog:false, toneMapped:false })
  );
  mesh.renderOrder = 999;
  return { cv:cv, ctx:ctx, tex:tex, mesh:mesh, w:w, h:h };
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

function makeBeamMaterial(colorHex) {
  return new THREE.ShaderMaterial({
    transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, side:THREE.DoubleSide,
    uniforms: {
      uColor:{ value:new THREE.Color(colorHex) }, uTime:{ value:0 },
      uActive:{ value:0.0 }, uOpacity:{ value:0.9 }
    },
    vertexShader: [
      'varying vec2 vUv;',
      'void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }'
    ].join('\n'),
    fragmentShader: [
      'uniform vec3 uColor; uniform float uTime; uniform float uActive; uniform float uOpacity;',
      'varying vec2 vUv;',
      'void main(){',
      '  float fade = pow(1.0 - vUv.y, 1.5);',
      '  float bands = sin((vUv.y * 20.0) - uTime * 2.4);',
      '  bands = smoothstep(0.5, 1.0, bands) * 0.6;',
      '  float sweep = smoothstep(0.88, 1.0, sin((vUv.y * 3.0) - uTime * (2.0 + uActive * 5.0)));',
      '  float edge = sin(vUv.x * 3.14159);',
      '  float a = (fade * (0.48 + bands + sweep * 0.8)) * edge;',
      '  a *= uOpacity * (0.7 + uActive * 0.8);',
      '  gl_FragColor = vec4(uColor * (1.0 + uActive * 0.7), a);',
      '}'
    ].join('\n')
  });
}

function makeFresnelMaterial(colorHex) {
  return new THREE.ShaderMaterial({
    transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, side:THREE.FrontSide,
    uniforms: {
      uColor:{ value:new THREE.Color(colorHex) }, uTime:{ value:0 },
      uActive:{ value:0.0 }, uPower:{ value:2.6 }
    },
    vertexShader: [
      'varying vec3 vN; varying vec3 vV;',
      'void main(){',
      '  vec4 mv = modelViewMatrix * vec4(position,1.0);',
      '  vN = normalize(normalMatrix * normal);',
      '  vV = normalize(-mv.xyz);',
      '  gl_Position = projectionMatrix * mv;',
      '}'
    ].join('\n'),
    fragmentShader: [
      'uniform vec3 uColor; uniform float uTime; uniform float uActive; uniform float uPower;',
      'varying vec3 vN; varying vec3 vV;',
      'void main(){',
      '  float rim = 1.0 - max(dot(normalize(vN), normalize(vV)), 0.0);',
      '  rim = pow(rim, uPower);',
      '  float pulse = 0.85 + 0.15 * sin(uTime * 2.0);',
      '  float a = rim * pulse * (0.75 + uActive * 0.8);',
      '  gl_FragColor = vec4(uColor * (1.3 + uActive * 0.8), a);',
      '}'
    ].join('\n')
  });
}

function makeScanMaterial() {
  return new THREE.ShaderMaterial({
    transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, side:THREE.DoubleSide,
    uniforms: { uColor:{ value:new THREE.Color('#2dffa0') }, uTime:{ value:0 } },
    vertexShader: [
      'varying vec2 vUv;',
      'void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }'
    ].join('\n'),
    fragmentShader: [
      'uniform vec3 uColor; uniform float uTime;',
      'varying vec2 vUv;',
      'void main(){',
      '  vec2 p = vUv - 0.5;',
      '  float r = length(p) * 2.0;',
      '  if (r > 1.0) discard;',
      '  float ring = sin(r * 26.0 - uTime * 1.6);',
      '  ring = smoothstep(0.86, 1.0, ring) * 0.5;',
      '  vec2 g = abs(fract(vUv * 26.0) - 0.5);',
      '  float grid = smoothstep(0.46, 0.5, max(g.x, g.y)) * 0.10;',
      '  float ang = atan(p.y, p.x);',
      '  float sweep = smoothstep(0.90, 1.0, cos(ang - uTime * 0.7));',
      '  sweep *= (1.0 - r) * 0.35;',
      '  float falloff = pow(1.0 - r, 1.4);',
      '  float a = (ring + grid + sweep) * falloff * 0.55;',
      '  gl_FragColor = vec4(uColor, a);',
      '}'
    ].join('\n')
  });
}

function buildEmitterModel(shape, color) {
  const g = new THREE.Group(); const mats = [];
  const M = (o) => { const m = new THREE.MeshBasicMaterial({ color:color.clone(),
    fog:false, toneMapped:false, transparent:o<1, opacity:o }); mats.push(m); return m; };
  const WHITE = () => new THREE.MeshBasicMaterial({ color:0xffffff, fog:false, toneMapped:false });

  if (shape === 'drone') {
    g.add(new THREE.Mesh(new THREE.BoxGeometry(0.5,0.16,0.5), M(1)));
    const armG = new THREE.CylinderGeometry(0.035,0.035,0.9,6);
    for (let i=0;i<2;i++){
      const arm = new THREE.Mesh(armG, M(1));
      arm.rotation.z = Math.PI/2; arm.rotation.y = (i===0?1:-1)*Math.PI/4;
      g.add(arm);
    }
    const rotG = new THREE.TorusGeometry(0.22,0.028,6,14);
    [[0.45,0.45],[0.45,-0.45],[-0.45,0.45],[-0.45,-0.45]].forEach(function(p){
      const r = new THREE.Mesh(rotG, M(1));
      r.rotation.x = Math.PI/2; r.position.set(p[0],0.10,p[1]);
      g.add(r);
      const hub = new THREE.Mesh(new THREE.SphereGeometry(0.05,6,5), WHITE());
      hub.position.set(p[0],0.10,p[1]); g.add(hub);
    });
  } else if (shape === 'remote') {
    g.add(new THREE.Mesh(new THREE.BoxGeometry(0.5,0.14,0.75), M(1)));
    const antG = new THREE.CylinderGeometry(0.025,0.025,0.55,6);
    [-0.16,0.16].forEach(function(x,i){
      const a = new THREE.Mesh(antG, M(1));
      a.position.set(x,0.32,-0.28); a.rotation.x = -0.5; a.rotation.z = i===0?0.25:-0.25;
      g.add(a);
      const tip = new THREE.Mesh(new THREE.SphereGeometry(0.045,6,5), WHITE());
      tip.position.set(x + (i===0?0.13:-0.13), 0.55, -0.53); g.add(tip);
    });
    [-0.13,0.13].forEach(function(x){
      const stick = new THREE.Mesh(new THREE.SphereGeometry(0.06,8,6), WHITE());
      stick.position.set(x,0.11,0.16); g.add(stick);
    });
  } else if (shape === 'antenna') {
    const base = new THREE.Mesh(new THREE.BoxGeometry(0.4,0.14,0.4), M(1));
    base.position.y = -0.35; g.add(base);
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.05,0.8,6), M(1));
    pole.position.y = 0.05; g.add(pole);
    const tip = new THREE.Mesh(new THREE.SphereGeometry(0.07,8,6), WHITE());
    tip.position.y = 0.48; g.add(tip);
    [0.22,0.38,0.54].forEach(function(r){
      const arc = new THREE.Mesh(new THREE.TorusGeometry(r,0.022,6,14,Math.PI*0.55), M(0.95));
      arc.position.y = 0.48; arc.rotation.z = Math.PI*0.225;
      g.add(arc);
    });
  } else {
    g.add(new THREE.Mesh(new THREE.SphereGeometry(0.55,20,16), M(1)));
    const eq = new THREE.Mesh(new THREE.TorusGeometry(0.72,0.03,6,24), M(0.95));
    eq.rotation.x = Math.PI/2; g.add(eq);
  }
  g.userData.mats = mats;
  return g;
}

/* ============================================================
   Formation geometry — ported 1:1 from the capstone's Python
   get_formation_offsets(). Same numbers, same units (metres),
   same coordinate convention (x=right, y=forward -> mapped here
   to scene x=east, z=-north; z=up -> scene y=up).
   dispersed/converging are randomized scatter by design (matches
   the Python: a fresh np.random.default_rng() draw per call).
   ============================================================ */
const FORMATION_NAMES = ['v_shape','encirclement','column','diamond','dispersed','converging','shield'];

function randomBoxScatter() {
  // low=[-20,-20,-10], high=[20,20,10] on [right,forward,up] -> [x,z,y] here
  const pts = [];
  for (let i=0;i<6;i++) {
    pts.push([
      -20 + Math.random()*40,   // x (right)
      -10 + Math.random()*20,   // y (up)
      -20 + Math.random()*40    // z (forward, sign handled by caller)
    ]);
  }
  return pts;
}

function getFormationOffsets(type, spread) {
  spread = spread === undefined ? 1.0 : spread;
  let off;   // array of 6x [x,y,z] in SCENE space (x=right, y=up, z=-forward)
  if (type === 'v_shape') {
    off = [[0,0,0],[-5,0,5],[5,0,5],[-10,0,10],[10,0,10],[0,0,8]];
  } else if (type === 'encirclement') {
    off = [];
    for (let i=0;i<6;i++){ const a = (2*Math.PI*i)/6; off.push([10*Math.cos(a), 0, -10*Math.sin(a)]); }
  } else if (type === 'column') {
    off = [[0,0,0],[0,0,5],[0,0,10],[0,0,15],[0,0,20],[0,0,25]];
  } else if (type === 'diamond') {
    off = [[0,10,0],[0,0,-10],[-10,0,0],[10,0,0],[0,0,10],[0,-10,0]];
  } else if (type === 'dispersed' || type === 'converging') {
    off = randomBoxScatter().map(p=>[p[0], p[1], -p[2]]);
  } else if (type === 'shield') {
    off = [[-10,5,-10],[0,5,-10],[10,5,-10],[-10,-5,-10],[0,-5,-10],[10,-5,-10]];
  } else {
    throw new Error('unknown formation: ' + type);
  }
  return off.map(p => [p[0]*spread, p[1]*spread, p[2]*spread]);
}

/* exact cosine S-curve blend from the transition generator:
   alpha=0 -> pure A, alpha=1 -> pure B, physically-plausible ease. */
function cosineRamp(progress) {
  progress = clamp(progress, 0, 1);
  return (1 - Math.cos(Math.PI * progress)) / 2;
}
function blendOffsets(a, b, alpha) {
  return a.map((p,i) => [
    p[0]*(1-alpha) + b[i][0]*alpha,
    p[1]*(1-alpha) + b[i][1]*alpha,
    p[2]*(1-alpha) + b[i][2]*alpha
  ]);
}

function shapeDescriptor(points) {
  // points: 6x [x,y,z] in a shared frame. Horizontal-plane (x,z) shape,
  // recentered and scale-normalized so absolute position/size don't matter.
  let cx=0, cz=0;
  points.forEach(p=>{ cx+=p[0]; cz+=p[2]; });
  cx/=points.length; cz/=points.length;
  const pts = points.map(p=>[p[0]-cx, p[2]-cz]);

  const radii = pts.map(p=>Math.hypot(p[0],p[1])).sort((a,b)=>a-b);
  const meanR = (radii.reduce((a,b)=>a+b,0)/radii.length) || 1;
  const radiiN = radii.map(r=>r/meanR);

  const nn = pts.map((p,i)=>{
    let m=Infinity;
    pts.forEach((q,j)=>{ if(i!==j){ const d=Math.hypot(p[0]-q[0],p[1]-q[1]); if(d<m)m=d; } });
    return m/meanR;
  }).sort((a,b)=>a-b);

  let sxx=0,szz=0,sxz=0;
  pts.forEach(p=>{ sxx+=p[0]*p[0]; szz+=p[1]*p[1]; sxz+=p[0]*p[1]; });
  sxx/=pts.length; szz/=pts.length; sxz/=pts.length;
  const tr=sxx+szz, det=sxx*szz-sxz*sxz;
  const disc=Math.sqrt(Math.max(0, tr*tr/4-det));
  const l1=tr/2+disc, l2=Math.max(1e-6, tr/2-disc);
  const aspect = Math.sqrt(l1/l2);

  const hull = convexHull2D(pts);
  const hullArea = Math.abs(polygonArea(hull)) / (meanR*meanR || 1);

  return radiiN.concat(nn).concat([aspect, hullArea]);
}

function convexHull2D(pts) {
  const p = pts.slice().sort((a,b)=> a[0]===b[0] ? a[1]-b[1] : a[0]-b[0]);
  const cross=(o,a,b)=>(a[0]-o[0])*(b[1]-o[1])-(a[1]-o[1])*(b[0]-o[0]);
  const lower=[]; for (const pt of p){ while(lower.length>=2 && cross(lower[lower.length-2],lower[lower.length-1],pt)<=0) lower.pop(); lower.push(pt); }
  const upper=[]; for (let i=p.length-1;i>=0;i--){ const pt=p[i]; while(upper.length>=2 && cross(upper[upper.length-2],upper[upper.length-1],pt)<=0) upper.pop(); upper.push(pt); }
  lower.pop(); upper.pop();
  return lower.concat(upper);
}
function polygonArea(poly) {
  let a=0;
  for (let i=0;i<poly.length;i++){ const [x1,y1]=poly[i], [x2,y2]=poly[(i+1)%poly.length]; a += x1*y2 - x2*y1; }
  return a/2;
}

/* z-score normalization across the 7 templates, computed once, reused for
   every live frame so templates and live vectors are directly comparable. */
function buildClassifier(templatesByName) {
  const names = FORMATION_NAMES.filter(n => templatesByName[n]);
  const raw = names.map(n => shapeDescriptor(templatesByName[n]));
  const dims = raw[0].length;
  const mean = new Array(dims).fill(0), std = new Array(dims).fill(0);
  raw.forEach(v => v.forEach((x,i)=> mean[i]+=x));
  mean.forEach((m,i)=> mean[i]=m/raw.length);
  raw.forEach(v => v.forEach((x,i)=> std[i]+=(x-mean[i])*(x-mean[i])));
  std.forEach((s,i)=> std[i]=Math.sqrt(s/raw.length) || 1);
  const norm = v => v.map((x,i)=> (x-mean[i])/std[i]);
  const templatesN = raw.map(norm);

  return {
    names: names,
    classify: function (points) {
      const v = norm(shapeDescriptor(points));
      const dists = templatesN.map(t => Math.hypot(...t.map((x,i)=>x-v[i])));
      const w = dists.map(d => Math.exp(-d));
      const sum = w.reduce((a,b)=>a+b,0) || 1;
      const conf = w.map(x=>x/sum);
      let top=0; for (let i=1;i<conf.length;i++) if (conf[i]>conf[top]) top=i;
      return { label: names[top], confidences: names.map((n,i)=>[n, conf[i]]) };
    }
  };
}

function makeWireframeClone(src, color) {
  const g = new THREE.Group(); const mats = [];
  src.traverse(function (o) {
    if (o.isMesh) {
      const m = new THREE.Mesh(o.geometry,
        new THREE.MeshBasicMaterial({ color:color.clone(), wireframe:true, transparent:true,
          opacity:0.6, depthTest:false, fog:false, toneMapped:false }));
      m.position.copy(o.position); m.rotation.copy(o.rotation); m.scale.copy(o.scale);
      m.renderOrder = 12; mats.push(m.material); g.add(m);
    }
  });
  g.userData.mats = mats;
  return g;
}

AFRAME.registerComponent('xr-launcher', {
  init: function () {
    const self = this;
    this.renderer = null;
    this.bgc = new THREE.Color(CONFIG.bg);
    this.fog = new THREE.FogExp2(this.bgc.getHex(), CONFIG.fogDensity);
    this.arBtn = document.getElementById('btn-ar');
    this.vrBtn = document.getElementById('btn-vr');
    this.diag  = document.getElementById('diag');
    this.setWorld(true);
    const ready = () => { self.renderer = self.el.renderer; self.probe(); };
    if (this.el.renderer) ready(); else this.el.addEventListener('loaded', ready);
    this.arBtn.addEventListener('click', () => self.enter('immersive-ar'));
    this.vrBtn.addEventListener('click', () => self.enter('immersive-vr'));
    this.el.addEventListener('exit-vr', () => {
      document.body.classList.remove('in-xr');
      if (window.RFX) window.RFX.isAR = false;
      self.setWorld(true);
    });
  },
  probe: function () {
    const self = this;
    if (!navigator.xr) {
      this.diag.innerHTML = 'navigator.xr MISSING — not a WebXR browser / insecure origin';
      this.diag.className = 'bad'; return;
    }
    Promise.all([
      navigator.xr.isSessionSupported('immersive-ar').catch(()=>false),
      navigator.xr.isSessionSupported('immersive-vr').catch(()=>false)
    ]).then(([ar, vr]) => {
      self.arBtn.disabled = !ar; self.vrBtn.disabled = !vr;
      self.arBtn.classList.toggle('on', ar); self.vrBtn.classList.toggle('on', vr);
      self.diag.innerHTML =
        'immersive-ar: <b>' + (ar?'YES':'NO') + '</b> &nbsp; immersive-vr: <b>' + (vr?'YES':'NO') + '</b>' +
        (ar ? '<br>tap ENTER MIXED REALITY for passthrough'
            : '<br>no passthrough — use the standalone Meta Quest Browser (not Link)');
      self.diag.className = ar ? 'ok' : 'warn';
    });
  },
  enter: function (mode) {
    const self = this;
    if (!navigator.xr || !this.renderer) return;
    const isAR = mode === 'immersive-ar';
    const opts = isAR
      ? { requiredFeatures:['local-floor'], optionalFeatures:['bounded-floor','hand-tracking','anchors','plane-detection','mesh-detection'] }
      : { requiredFeatures:['local-floor'], optionalFeatures:['bounded-floor','hand-tracking'] };
    navigator.xr.requestSession(mode, opts).then((session) => {
      self.setWorld(!isAR);
      if (window.RFX) {
        window.RFX.isAR = isAR;
        window.RFX.arEnterTime = performance.now();
      }
      self.renderer.xr.setReferenceSpaceType('local-floor');
      self.renderer.xr.setSession(session).then(() => {
        document.body.classList.add('in-xr');
        if (isAR) {
          const world = document.querySelector('#world');
          const al = world && world.components['anchor-lock'];
          if (al) requestAnimationFrame(() => requestAnimationFrame(() => al.bootstrap()));
        }
      });
      session.addEventListener('end', () => {
        document.body.classList.remove('in-xr');
        if (window.RFX) window.RFX.isAR = false;
        self.setWorld(true);
      });
    }).catch((err) => {

AFRAME.registerComponent('anchor-lock', {
  init: function () {
    this.anchor = null; this.pending = false; this.recenterFlag = false;
    this.world = this.el.object3D; this._q = new THREE.Quaternion();
    this.lastPoseOK = false; this.anchorCount = 0;
    this.anchorPos = new THREE.Vector3();
  },
  requestRecenter: function () { this.recenterFlag = true; },
  bootstrap: function () {
    const scene = this.el.sceneEl, frame = scene.frame, r = scene.renderer;
    if (!frame || !r || !r.xr || !frame.createAnchor) return;
    const refSpace = r.xr.getReferenceSpace();
    if (!refSpace || this.anchor || this.pending) return;
    this._makeAnchor(frame, refSpace, new XRRigidTransform());
  },
  _makeAnchor: function (frame, refSpace, xform) {
    const self = this, old = this.anchor;
    this.pending = true;
    try {
      frame.createAnchor(xform, refSpace).then(function (a) {
        if (old && old.delete) { try { old.delete(); } catch (e) {} }
        self.anchor = a; self.pending = false; self.anchorCount++;
        if (window.RFX) window.RFX.anchored = true;
      }).catch(function () { self.pending = false; });
    } catch (e) { self.pending = false; }
  },
  tick: function () {
    const S = window.RFX;
    if (!S || !S.isAR) return;
    const scene = this.el.sceneEl, frame = scene.frame, r = scene.renderer;
    if (!frame || !r || !r.xr || !frame.createAnchor) return;
    const refSpace = r.xr.getReferenceSpace();
    if (!refSpace) return;
    if (this.recenterFlag) {
      this.recenterFlag = false;
      const vp = frame.getViewerPose(refSpace);
      if (vp) {
        const t = vp.transform;
        this._q.set(t.orientation.x, t.orientation.y, t.orientation.z, t.orientation.w);
        const e = new THREE.Euler().setFromQuaternion(this._q, 'YXZ');
        const yq = new THREE.Quaternion().setFromEuler(new THREE.Euler(0, e.y, 0));
        this._makeAnchor(frame, refSpace, new XRRigidTransform(
          { x:t.position.x, y:0, z:t.position.z },
          { x:yq.x, y:yq.y, z:yq.z, w:yq.w }));
      }
    }
    if (!this.anchor && !this.pending) this._makeAnchor(frame, refSpace, new XRRigidTransform());
    if (this.anchor) {
      const pose = frame.getPose(this.anchor.anchorSpace, refSpace);
      this.lastPoseOK = !!pose;
      if (pose) {
        const p = pose.transform.position, o = pose.transform.orientation;
        this.world.position.set(p.x, p.y, p.z);
        this.world.quaternion.set(o.x, o.y, o.z, o.w);
        this.anchorPos.set(p.x, p.y, p.z);
      }
    } else {
      this.lastPoseOK = false;
    }
  }
});

    this.trailLine = new THREE.Line(new THREE.BufferGeometry(),

    this.phase = Math.random()*1800;

  },
  setFocused: function (f) {
    if (this.focused === f) return;
    this.focused = f;
    this.beamMat.uniforms.uActive.value = f ? 1.0 : 0.0;
    this.rimMat.uniforms.uActive.value = f ? 1.0 : 0.0;
    this.model.scale.setScalar(f ? 1.7 : 1.4);
    this.shell.material.opacity = f ? 0.9 : 0.0;
  },
  toggleClaim: function () {
    this.claimed = !this.claimed;
    this.claimRing.visible = this.claimed;
    const c = new THREE.Color(this.claimed ? CLAIM_COLOR : this.baseColor);
    this.beamMat.uniforms.uColor.value.copy(c);
    this.rimMat.uniforms.uColor.value.copy(c);
    this.model.userData.mats.forEach(function(m){ m.color.copy(c); });
    this.ghost.userData.mats.forEach(function(m){ m.color.copy(c); });
    this.spine.material.color.copy(c);
    this.shell.material.color.copy(c);
    this.ring.material.color.copy(c);
    this.pulse.material.color.copy(c);
    return this.claimed;
  },
  currentColor: function () { return this.claimed ? CLAIM_COLOR : this.baseColor; },
  tick: function (time, dt) {
    const S = window.RFX;
    if (!S) return;
    const e = this.e, root = this.el.object3D;

    const active = (e.mode === S.mode);
    if (root.visible !== active) root.visible = active;
    this.trailLine.visible = active && S.showTrails;
    if (!active) return;

    const step = Math.min(dt || 16, 50) / 1000;
    if (e.driven) {
      root.position.set(e.pos[0], 0, e.pos[2]);
    } else if (S.playing) {
      e.pos[0] += e.vel[0] * step * S.speed;
      e.pos[2] += e.vel[2] * step * S.speed;
      e.vel[0] += Math.sin(time*0.0005 + this.phase)*0.02*step;
      e.vel[2] += Math.cos(time*0.0004 + this.phase)*0.02*step;
      if (Math.hypot(e.pos[0], e.pos[2]) > 75) { e.vel[0]*=-1; e.vel[2]*=-1; }
      root.position.set(e.pos[0], 0, e.pos[2]);
    }
    const ts = time * 0.001;
    this.beamMat.uniforms.uTime.value = ts;
    this.rimMat.uniforms.uTime.value = ts;
    this.beam.visible = S.beams;
    this.spine.visible = S.beams;
    const t = ((time + this.phase) % 1800) / 1800;
    const s = 1 + t*4.0;
    this.pulse.scale.set(s,1,s);
    this.pulse.material.opacity = 0.6 * (1 - t);
    const bob = e.driven
      ? Math.max(2.0, e.pos[1])
      : 2.6 + Math.sin(time*0.0015 + this.phase)*0.10;
    this.model.position.y = this.hit.position.y = bob;
    this.rim.position.y = this.shell.position.y = bob;
    this.hot.position.y = this.ghost.position.y = this.back.position.y = bob;
    if (e.driven) {
      const k = bob / 30;
      this.beam.scale.y = k;  this.beam.position.y = bob/2;
      this.spine.scale.y = k; this.spine.position.y = bob/2;
    }
    this.model.rotation.y += step * 0.4;
    this.ghost.rotation.y = this.model.rotation.y;
    this.hot.material.opacity = 0.85 + 0.15*Math.sin(time*0.005 + this.phase);

    if (time - this._occT > 250) {
      this._occT = time;
      let occluded = false;
      const occ = this.el.sceneEl.components['real-occluders'];
      const cam2 = this.el.sceneEl.camera;
      if (occ && occ.entries.size && cam2) {
        cam2.getWorldPosition(this._cp);
        this.model.getWorldPosition(this._wp);
        const dir = this._wp.clone().sub(this._cp);
        const dist = dir.length();
        this._occRay.set(this._cp, dir.normalize());
        this._occRay.far = dist - 0.05;
        occluded = this._occRay.intersectObjects(occ.group.children, false).length > 0;
      }
      this.ghost.visible = occluded;
    }
    this.shell.rotation.y += step * (this.focused ? 1.1 : 0.35);
    this.shell.rotation.x += step * 0.15;
    if (this.claimed) {
      this.claimRing.rotation.z += step * 0.8;
      this.claimRing.material.opacity = 0.65 + Math.sin(time*0.004)*0.25;
    }

    if (time - this.trailLast > 450) {
      this.trailLast = time;
      this.trailPts.push(new THREE.Vector3(root.position.x, bob, root.position.z));
      if (this.trailPts.length > 14) this.trailPts.shift();
      if (this.trailPts.length > 1) this.trailLine.geometry.setFromPoints(this.trailPts);
    }
  }
});

AFRAME.registerComponent('real-occluders', {
  init: function () {
    this.entries = new Map();
    this.group = new THREE.Group();
    this.el.object3D.add(this.group);
    this.occMat = new THREE.MeshBasicMaterial({ colorWrite:false });
    this.occMat.depthWrite = true;
  },
  _planeGeometry: function (plane) {
    const pts = plane.polygon;
    if (!pts || pts.length < 3) return null;
    const verts = [], idx = [];
    for (let i=0;i<pts.length;i++) verts.push(pts[i].x, pts[i].y, pts[i].z);
    for (let i=1;i<pts.length-1;i++) idx.push(0, i, i+1);
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
    g.setIndex(idx);
    return g;
  },
  _meshGeometry: function (xrMesh) {
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(xrMesh.vertices, 3));
    g.setIndex(new THREE.BufferAttribute(xrMesh.indices, 1));
    return g;
  },
  tick: function () {
    const S = window.RFX;
    const scene = this.el.sceneEl, frame = scene.frame, r = scene.renderer;
    this.group.visible = !!(S && S.isAR);
    if (!this.group.visible || !frame || !r || !r.xr) return;
    const ref = r.xr.getReferenceSpace();
    if (!ref) return;
    const seen = new Set();
    const self = this;
    function handle(item, space, buildGeom, changedTime) {
      seen.add(item);
      let e = self.entries.get(item);
      if (!e || (changedTime !== undefined && e.changed !== changedTime)) {
        const g = buildGeom(item);
        if (!g) return;
        if (e) { e.mesh.geometry.dispose(); e.mesh.geometry = g; e.changed = changedTime; }
        else {
          const m = new THREE.Mesh(g, self.occMat);
          m.matrixAutoUpdate = false;
          m.renderOrder = -10;
          self.group.add(m);
          e = { mesh:m, changed:changedTime };
          self.entries.set(item, e);
        }
      }
      const pose = frame.getPose(space, ref);
      if (pose) { e.mesh.visible = true; e.mesh.matrix.fromArray(pose.transform.matrix); }
      else e.mesh.visible = false;
    }
    if (frame.detectedPlanes) {
      frame.detectedPlanes.forEach(function (pl) {
        handle(pl, pl.planeSpace, self._planeGeometry.bind(self), pl.lastChangedTime);
      });
    }
    if (frame.detectedMeshes) {
      frame.detectedMeshes.forEach(function (xm) {
        handle(xm, xm.meshSpace, self._meshGeometry.bind(self), xm.lastChangedTime);
      });
    }
    this.entries.forEach(function (e, key) {
      if (!seen.has(key)) { self.group.remove(e.mesh); e.mesh.geometry.dispose(); self.entries.delete(key); }
    });
    if (S) S.occluderCount = this.entries.size;
  }
});

/* ============================================================
   swarm-player — generates formations parametrically (ported
   from the capstone's Python) instead of replaying a CSV.
   Selecting a formation captures wherever the swarm currently is
   and blends to the target using the SAME cosine S-curve the
   Python generator uses, over CONFIG.blendSeconds. While blending
   the state is explicitly TRANSITIONING (matching the real 8-class
   model: 7 formations + transitioning, not a forced top-1 guess).
   Once settled, the geometric classifier runs continuously as an
   independent check — same input/output contract a real trained
   classifier would fill.
   ============================================================ */
AFRAME.registerComponent('swarm-player', {
  init: function () {
    this.comps = [];
    this.formation = 'v_shape';
    this.pendingFormation = null;
    this.offsetsB = getFormationOffsets('v_shape', 1.0);
    this.offsetsA = this.offsetsB;
    this.blending = false; this.blendT = 0; this.settledAt = 0;
    this.prevPts = null;
    this.lastClassify = 0;

    // classifier templates built from the EXACT ported geometry (no noise) —
    // dispersed/converging get a fixed reference draw purely for template
    // purposes; live dispersed/converging still redraws fresh each selection.
    const templates = {};
    FORMATION_NAMES.forEach(n => { templates[n] = getFormationOffsets(n, 1.0); });
    this.classifier = buildClassifier(templates);

    const self = this;
    this.el.addEventListener('targets-ready', function () {
      self.comps = Array.prototype.map.call(document.querySelectorAll('[rf-emitter]'),
        function (el) { return el.components['rf-emitter']; })
        .filter(function (c) { return c.e.mode === 'swarm'; });
      self.initOverlay();
    });
  },
  initOverlay: function () {
    const world = document.querySelector('#world').object3D;
    const geo = new THREE.BufferGeometry().setFromPoints(new Array(7).fill(new THREE.Vector3()));
    this.overlay = new THREE.LineLoop(geo, new THREE.LineBasicMaterial({
      color:0x39e0ff, transparent:true, opacity:0.55, depthTest:false, fog:false, toneMapped:false }));
    this.overlay.renderOrder = 11; world.add(this.overlay);
    this.centroidDot = new THREE.Mesh(new THREE.SphereGeometry(0.18,8,6),
      new THREE.MeshBasicMaterial({ color:0x39e0ff, transparent:true, opacity:0.7,
        depthTest:false, fog:false, toneMapped:false }));
    this.centroidDot.renderOrder = 11; world.add(this.centroidDot);
  },

  // Called by the control-hub FORMATION row (or any external caller).
  // Freezes wherever the swarm currently is as the blend start, so
  // redirecting mid-maneuver behaves the way a real swarm would.
  selectFormation: function (name) {
    if (name === this.formation && !this.blending) return;
    if (name === this.pendingFormation && this.blending) return;
    this.offsetsA = this.currentOffsets || this.offsetsB;
    this.offsetsB = getFormationOffsets(name, 1.0);
    this.pendingFormation = name;
    this.blending = true; this.blendT = 0;
  },

  tick: function (time, dt) {
    if (!this.comps.length) return;
    const S = window.RFX;
    const stepped = S.playing ? Math.min(dt||16,50)/1000 * S.speed : 0;
    const now = time/1000;
    let offsets, alpha = 1;

    if (this.blending) {
      this.blendT += stepped;
      alpha = cosineRamp(this.blendT / CONFIG.blendSeconds);
      offsets = blendOffsets(this.offsetsA, this.offsetsB, alpha);
      if (this.blendT >= CONFIG.blendSeconds) {
        this.blending = false;
        this.formation = this.pendingFormation;
        this.pendingFormation = null;
        this.settledAt = now;
      }
    } else {
      let scale = 1.0;
      if (this.formation === 'converging') {
        const elapsed = now - this.settledAt;
        scale = 1.0 - 0.9 * clamp(elapsed / CONFIG.convergeShrinkSeconds, 0, 1);
      }
      offsets = this.offsetsB.map(p => [p[0]*scale, p[1]*scale, p[2]*scale]);
    }
    this.currentOffsets = offsets;

    // fixed centroid with a gentle bob for life (the Python generator drifts
    // the centroid indefinitely for finite training clips; a live indefinite
    // demo instead holds position so the swarm never flies out of anchor range)
    const cx = 0, cy = 100 + Math.sin(time*0.0004)*1.2, cz = 0;
    const livePts = [];
    for (let d=0; d<6; d++) {
      const c = this.comps[d]; if (!c) continue;
      const e = c.e;
      const px = cx+offsets[d][0], py = cy+offsets[d][1], pz = cz+offsets[d][2];
      if (this.prevPts && stepped>0) {
        e.vel[0]=(px-this.prevPts[d][0])/stepped; e.vel[1]=(py-this.prevPts[d][1])/stepped; e.vel[2]=(pz-this.prevPts[d][2])/stepped;
      }
      e.pos[0]=px; e.pos[1]=py; e.pos[2]=pz;
      livePts.push([px,py,pz]);
    }
    this.prevPts = livePts;

    // classification state — TRANSITIONING is ground truth (we control the
    // blend), the geometric classifier only runs once settled, matching the
    // real model's own from -> transitioning -> to design.
    if (this.blending) {
      S.transState = 'transitioning';
      S.transFrom = this.formation; S.transTo = this.pendingFormation; S.transAlpha = alpha;
      S.classLabel = null; S.classConf = null;
    } else {
      S.transState = 'settled';
      S.selectedFormation = this.formation;
      if (time - this.lastClassify > CONFIG.classifyEveryMs) {
        this.lastClassify = time;
        const result = this.classifier.classify(livePts);
        S.classLabel = result.label;
        S.classConf = result.confidences;
      }
    }

    if (this.overlay && S.showOverlay && S.mode === 'swarm') {
      this.overlay.visible = true; this.centroidDot.visible = true;
      const ordered = livePts.slice().sort((p,q)=>
        Math.atan2(p[2]-cz,p[0]-cx) - Math.atan2(q[2]-cz,q[0]-cx));
      const loopPts = ordered.map(p=>new THREE.Vector3(p[0],p[1],p[2]));
      loopPts.push(loopPts[0]);
      this.overlay.geometry.setFromPoints(loopPts);
      this.centroidDot.position.set(cx,cy,cz);
    } else if (this.overlay) {
      this.overlay.visible = false; this.centroidDot.visible = false;
    }
  }
});

/* ---------- classifier readout: TRANSITIONING (A -> B, blend%) while
   flying, CLASSIFIED + live confidence bars once settled. Leaner than
   before — no separate truth/match row, since "truth" is now just the
   user's own selection and restating it once matched adds nothing. ---------- */
AFRAME.registerComponent('formation-banner', {
  init: function () {
    this.panel = makeCanvasPanel(0.56, 0.20, 2200);
    this.panel.mesh.visible = false;
    this.el.object3D.add(this.panel.mesh);
    this.last = 0;
  },
  tick: function (time) {
    const S = window.RFX;
    const show = !!(S && S.transState && S.mode === 'swarm');
    this.panel.mesh.visible = show;
    if (!show || time - this.last < 120) return;
    this.last = time;
    this.draw(S);
  },
  draw: function (S) {
    const ctx=this.panel.ctx, cv=this.panel.cv, W=cv.width, H=cv.height;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='rgba(2,10,7,0.93)';
    roundRect(ctx,3,3,W-6,H-6,16); ctx.fill();

    if (S.transState === 'transitioning') {
      ctx.strokeStyle='#ffb454'; ctx.lineWidth=4; ctx.stroke();
      ctx.textBaseline='middle';
      ctx.fillStyle='#ffb454'; ctx.textAlign='left';
      ctx.font='bold ' + Math.round(H*0.16) + 'px ui-monospace, monospace';
      ctx.fillText('TRANSITIONING', W*0.035, H*0.15);
      ctx.textAlign='right';
      ctx.fillText(Math.round(S.transAlpha*100) + '%', W*0.965, H*0.15);
      ctx.fillStyle='#eafff6'; ctx.textAlign='left';
      ctx.font = Math.round(H*0.09) + 'px ui-monospace, monospace';
      ctx.fillText(S.transFrom.toUpperCase().replace('_',' ') + '  \u2192  ' + S.transTo.toUpperCase().replace('_',' '),
        W*0.035, H*0.30);
      const bx=W*0.035, bw=W*0.93, by=H*0.42, bh=H*0.09;
      ctx.fillStyle='rgba(255,255,255,0.10)'; roundRect(ctx,bx,by,bw,bh,bh/2); ctx.fill();
      ctx.fillStyle='#ffb454'; roundRect(ctx,bx,by,Math.max(bh,bw*S.transAlpha),bh,bh/2); ctx.fill();
      ctx.textAlign='center'; ctx.fillStyle='#7fae9c';
      ctx.font = Math.round(H*0.05) + 'px ui-monospace, monospace';
      ctx.fillText('live cosine blend \u2014 not classifier output', W/2, H*0.62);
      this.panel.tex.needsUpdate = true;
      return;
    }

    ctx.strokeStyle='#39e0ff'; ctx.lineWidth=4; ctx.stroke();
    ctx.textBaseline='middle';
    const top = (S.classConf && S.classLabel && S.classConf.find(c=>c[0]===S.classLabel)) || [S.classLabel,0];
    ctx.fillStyle='#39e0ff'; ctx.textAlign='left';
    ctx.font='bold ' + Math.round(H*0.155) + 'px ui-monospace, monospace';
    ctx.fillText('CLASSIFIED  ' + (S.classLabel||'\u2014').toUpperCase().replace('_',' '), W*0.035, H*0.13);
    ctx.textAlign='right';
    ctx.fillText(Math.round(top[1]*100) + '%', W*0.965, H*0.13);

    if (S.classConf) {
      const rows = S.classConf.slice().sort((a,b)=> a[0]<b[0]?-1:1);
      const rowTop = H*0.28, rowH = (H*0.68)/rows.length;
      rows.forEach((r,i) => {
        const y = rowTop + i*rowH;
        const isTop = r[0] === S.classLabel;
        ctx.textAlign='left'; ctx.fillStyle = isTop ? '#eafff6' : '#7fae9c';
        ctx.font = (isTop?'bold ':'') + Math.round(H*0.052) + 'px ui-monospace, monospace';
        ctx.fillText(r[0].toUpperCase().replace('_',' '), W*0.035, y+rowH*0.5);
        const bx = W*0.46, bw = W*0.44, bh = rowH*0.5;
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        roundRect(ctx, bx, y+rowH*0.25, bw, bh, bh/2); ctx.fill();
        ctx.fillStyle = isTop ? '#39e0ff' : '#3a5b50';
        roundRect(ctx, bx, y+rowH*0.25, Math.max(bh, bw*r[1]), bh, bh/2); ctx.fill();
        ctx.textAlign='right'; ctx.fillStyle = isTop ? '#39e0ff' : '#7fae9c';
        ctx.font = Math.round(H*0.045) + 'px ui-monospace, monospace';
        ctx.fillText(Math.round(r[1]*100)+'%', W*0.965, y+rowH*0.5);
      });
    }
    this.panel.tex.needsUpdate = true;
  }
});

AFRAME.registerComponent('gaze-picker', {
  init: function () {
    const self = this;
    this.ray = new THREE.Raycaster(); this.ray.far = CONFIG.gazeFar;
    this.origin = new THREE.Vector3(); this.dir = new THREE.Vector3();
    this.current = null; this.candidate = null; this.since = 0;
    this.claimArmed = 0;
    this.byMode = { blobs:[], swarm:[] }; this.compsByMode = { blobs:[], swarm:[] };
    this.el.addEventListener('targets-ready', function () {
      const comps = Array.prototype.map.call(document.querySelectorAll('[rf-emitter]'),
        function (el) { return el.components['rf-emitter']; });
      self.compsByMode.blobs = comps.filter(function(c){ return c.e.mode==='blobs'; });
      self.compsByMode.swarm = comps.filter(function(c){ return c.e.mode==='swarm'; });
      self.byMode.blobs = self.compsByMode.blobs.map(function(c){ return c.orb; });
      self.byMode.swarm = self.compsByMode.swarm.map(function(c){ return c.orb; });
    });
    ['triggerdown'].forEach(function (evt) {
      self.el.addEventListener(evt, function () { self.instantClaim(); });
    });
    // any mouse/touch click on the canvas — desktop-friendly parity with
    // the controller trigger. Guarded to the canvas so DOM overlay buttons
    // (Enter AR, mode/formation controls) never double-fire this.
    window.addEventListener('click', function (e) {
      if (e.target && e.target.tagName === 'CANVAS') self.instantClaim();
    });
  },
  // fresh raycast against whatever's under the reticle RIGHT NOW — click/
  // trigger acts immediately, it doesn't wait for the dwell timer in tick()
  // to have already picked something.
  pickTarget: function () {
    const cam = this.el.camera; const S = window.RFX;
    if (!cam || !S) return null;
    const orbs = this.byMode[S.mode], comps = this.compsByMode[S.mode];
    if (!orbs || !orbs.length) return null;
    cam.getWorldPosition(this.origin);
    cam.getWorldDirection(this.dir);
    this.ray.set(this.origin, this.dir);
    const hits = this.ray.intersectObjects(orbs, false);
    if (!hits.length) return null;
    const obj = hits[0].object;
    for (let i=0;i<comps.length;i++) if (comps[i].orb === obj) return comps[i];
    return null;
  },
  instantClaim: function () {
    const target = this.pickTarget();
    if (!target) return;
    if (this.current && this.current !== target) this.current.setFocused(false);
    target.setFocused(true); this.current = target; this.claimArmed = 0;
    this.claim();
  },
  claim: function () {
    if (!this.current) return;
    const on = this.current.toggleClaim();
    const hud = document.querySelector('#gaze-hud');
    if (hud && hud.components['gaze-hud']) hud.components['gaze-hud'].flash(on);
    this.claimArmed = 0;
  },
  tick: function (time, dt) {
    const cam = this.el.camera;
    const S = window.RFX;
    if (!cam || !S) return;
    const orbs = this.byMode[S.mode], comps = this.compsByMode[S.mode];
    if (this.current && this.current.e.mode !== S.mode) {
      this.current.setFocused(false); this.current = null; this.claimArmed = 0;
    }
    if (!orbs || !orbs.length) { window.RFX.gazed = null; window.RFX.claimProgress = 0; return; }
    cam.getWorldPosition(this.origin);
    cam.getWorldDirection(this.dir);
    this.ray.set(this.origin, this.dir);
    const hits = this.ray.intersectObjects(orbs, false);
    let comp = null;
    if (hits.length) {
      const obj = hits[0].object;
      for (let i=0;i<comps.length;i++) if (comps[i].orb === obj) { comp = comps[i]; break; }
    }
    if (comp !== this.candidate) { this.candidate = comp; this.since = time; this.claimArmed = 0; }
    if (comp && (time - this.since > CONFIG.dwellMs) && comp !== this.current) {
      if (this.current) this.current.setFocused(false);
      comp.setFocused(true); this.current = comp; this.claimArmed = 0;
    }
    if (!comp && this.current) { this.current.setFocused(false); this.current = null; this.claimArmed = 0; }
    if (this.current && comp === this.current) {
      this.claimArmed += (dt || 16);
      if (this.claimArmed > CONFIG.claimDwellMs + CONFIG.dwellMs) this.claim();
    }
    window.RFX.gazed = this.current;
    window.RFX.claimProgress = this.current
      ? Math.min(1, Math.max(0, (this.claimArmed - CONFIG.dwellMs) / CONFIG.claimDwellMs)) : 0;
  }
});

AFRAME.registerComponent('gaze-hud', {
  init: function () {
    this.panel = makeCanvasPanel(0.46, 0.26, 2200);
    this.panel.mesh.visible = false;
    this.el.object3D.add(this.panel.mesh);
    this.flashT = 0; this.flashOn = false; this.last = 0;
    this.v = new THREE.Vector3(); this.w = new THREE.Vector3();
  },
  flash: function (on) { this.flashT = 900; this.flashOn = on; },
  tick: function (time, dt) {
    const S = window.RFX;
    if (!S) return;
    if (this.flashT > 0) this.flashT -= (dt || 16);
    const g = S.gazed;
    this.panel.mesh.visible = !!g || this.flashT > 0;
    if (!this.panel.mesh.visible) return;
    if (time - this.last < 90) return;
    this.last = time;
    if (g) this.draw(g, S.claimProgress, time);
  },
  draw: function (g, prog, time) {
    const e = g.e, color = g.currentColor();
    const ctx = this.panel.ctx, cv = this.panel.cv, W = cv.width, H = cv.height;
    const range = Math.hypot(e.pos[0], e.pos[2]);
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = 'rgba(2,10,7,0.92)';
    roundRect(ctx,4,4,W-8,H-8,18); ctx.fill();
    ctx.strokeStyle = color; ctx.lineWidth = 6; ctx.stroke();
    ctx.textBaseline='middle';
    ctx.fillStyle = color; ctx.textAlign='left';
    ctx.font = 'bold ' + Math.round(H*0.155) + 'px ui-monospace, monospace';
    ctx.fillText(e.id, W*0.055, H*0.16);
    ctx.textAlign='right';
    ctx.fillText(Math.round(e.confidence*100) + '%', W*0.945, H*0.16);
    ctx.strokeStyle = color; ctx.globalAlpha=0.4; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(W*0.055,H*0.27); ctx.lineTo(W*0.945,H*0.27); ctx.stroke();
    ctx.globalAlpha=1;
    ctx.fillStyle = g.claimed ? CLAIM_COLOR : '#eafff6'; ctx.textAlign='left';
    ctx.font = 'bold ' + Math.round(H*0.115) + 'px ui-monospace, monospace';
    ctx.fillText(g.claimed ? 'HANDLED \u2713' : CLASSES[e.cls].name, W*0.055, H*0.40);
    const hd = bearing(e.vel[0], e.vel[2]);
    const cols = [
      ['RANGE', Math.round(range) + 'm'],
      ['SPEED', Math.hypot(e.vel[0],e.vel[2]).toFixed(1)],
      ['BRG',   Math.round(hd) + '\u00b0' + cardinal(hd)]
    ];
    for (let i=0;i<3;i++){
      const x = W*(0.19 + i*0.31);
      ctx.textAlign='center';
      ctx.fillStyle='#7fae9c'; ctx.font = Math.round(H*0.082) + 'px ui-monospace, monospace';
      ctx.fillText(cols[i][0], x, H*0.585);
      ctx.fillStyle='#eafff6'; ctx.font='bold ' + Math.round(H*0.135) + 'px ui-monospace, monospace';
      ctx.fillText(cols[i][1], x, H*0.72);
    }
    const by = H*0.87, bh = H*0.075, bx = W*0.055, bw = W*0.89;
    ctx.fillStyle='rgba(255,255,255,0.10)';
    roundRect(ctx,bx,by-bh/2,bw,bh,bh/2); ctx.fill();
    if (this.flashT > 0) {
      ctx.fillStyle = this.flashOn ? CLAIM_COLOR : '#7fae9c';
      roundRect(ctx,bx,by-bh/2,bw,bh,bh/2); ctx.fill();
      ctx.fillStyle='#02120c'; ctx.textAlign='center';
      ctx.font='bold ' + Math.round(H*0.072) + 'px ui-monospace, monospace';
      ctx.fillText(this.flashOn ? 'CLAIMED' : 'RELEASED', W/2, by);
    } else if (prog > 0.01) {
      ctx.fillStyle = CLAIM_COLOR;
      roundRect(ctx,bx,by-bh/2,Math.max(bh,bw*prog),bh,bh/2); ctx.fill();
      ctx.fillStyle='#7fae9c'; ctx.textAlign='center';
      ctx.font=Math.round(H*0.068) + 'px ui-monospace, monospace';
      ctx.fillText('HOLD GAZE TO ' + (g.claimed ? 'RELEASE' : 'CLAIM'), W/2, by - bh);
    } else {
      ctx.fillStyle='#5c7d70'; ctx.textAlign='center';
      ctx.font=Math.round(H*0.068) + 'px ui-monospace, monospace';
      ctx.fillText('TRIGGER OR HOLD GAZE TO ' + (g.claimed ? 'RELEASE' : 'CLAIM'), W/2, by);
    }
    this.panel.tex.needsUpdate = true;
  }
});

AFRAME.registerComponent('control-hub', {
  init: function () {
    const self = this;
    this.panel = makeCanvasPanel(0.60, 0.36, 2000);
    this.el.object3D.add(this.panel.mesh);

    const SCALE_PRESETS = [0.1, 0.05, 0.02, 0.008, 0.25];  // 1:10 .. 1:125, plus near-true 1:4

    this.ROWS = [
      { key:'mode',     label:'MODE',      col:0, row:0, get:function(S){ return [S.mode==='swarm'?'SWARM':'BLOBS', '#39e0ff']; },
        run:function(S){ S.mode = S.mode==='swarm' ? 'blobs' : 'swarm'; } },
      { key:'formation',label:'FORMATION', col:0, row:1, get:function(S){
          const sc = document.querySelector('a-scene'); const sp = sc && sc.components['swarm-player'];
          const name = sp ? (sp.pendingFormation || sp.formation) : 'v_shape';
          return [name.toUpperCase().replace('_',' '), S.transState==='transitioning'?'#ffb454':'#39e0ff'];
        },
        run:function(S){
          const sc = document.querySelector('a-scene'); const sp = sc && sc.components['swarm-player'];
          if (!sp) return;
          const cur = sp.pendingFormation || sp.formation;
          const idx = FORMATION_NAMES.indexOf(cur);
          const next = FORMATION_NAMES[(idx+1) % FORMATION_NAMES.length];
          sp.selectFormation(next);
          if (S.mode !== 'swarm') S.mode = 'swarm';   // picking a formation implies you want to see it
        } },
      { key:'anchor',   label:'ANCHOR',    col:0, row:2, get:function(){ return ['LOCK HERE', '#7fae9c']; },
        run:function(){ const w=document.querySelector('#world'); const c=w&&w.components['anchor-lock']; if(c) c.requestRecenter(); } },
      { key:'scale',    label:'SCALE',     col:0, row:3, get:function(S){ return ['1:' + Math.round(1/S.scale), '#39e0ff']; },
        run:function(S){
          const i = SCALE_PRESETS.findIndex(v => Math.abs(v-S.scale) < 1e-6);
          S.scale = SCALE_PRESETS[(i+1) % SCALE_PRESETS.length];
        } },
      { key:'resetview',label:'RESET VIEW',col:0, row:4, get:function(){ return ['ANCHOR+SCALE', '#7fae9c']; },
        run:function(S){ S.scale = CONFIG.scale; const w=document.querySelector('#world'); const c=w&&w.components['anchor-lock']; if(c) c.requestRecenter(); } },
      { key:'playback', label:'PLAYBACK',  col:1, row:0, get:function(S){ return [S.playing?'RUNNING':'PAUSED', S.playing?'#2dffa0':'#ffb454']; },
        run:function(S){ S.playing = !S.playing; } },
      { key:'speed',    label:'SPEED',     col:1, row:1, get:function(S){ return [S.speed+'x', '#39e0ff']; },
        run:function(S){ S.speed = S.speed>=4 ? 0.5 : S.speed*2; } },
      { key:'overlay',  label:'SHAPE OVR', col:1, row:2, get:function(S){ return [S.showOverlay?'ON':'OFF', S.showOverlay?'#2dffa0':'#7fae9c']; },
        run:function(S){ S.showOverlay = !S.showOverlay; } },
      { key:'trails',   label:'TRAILS',    col:1, row:3, get:function(S){ return [S.showTrails?'ON':'OFF', S.showTrails?'#2dffa0':'#7fae9c']; },
        run:function(S){ S.showTrails = !S.showTrails; } },
      { key:'debug',    label:'DEBUG',     col:1, row:4, get:function(S){ return [S.showStatus?'ON':'OFF', S.showStatus?'#2dffa0':'#7fae9c']; },
        run:function(S){ S.showStatus = !S.showStatus; } }
    ];

    // 2-column layout: halves the panel's vertical footprint (and therefore
    // its angular size in-headset) versus a single 10-row column.
    this.rowMeshes = this.ROWS.map(function (row) {
      const x = row.col===0 ? -0.155 : 0.155;
      const hp = new THREE.Mesh(new THREE.PlaneGeometry(0.29, 0.062),
        new THREE.MeshBasicMaterial({ visible:false }));
      hp.position.set(x, self.rowY(row.row), 0.003);
      self.panel.mesh.add(hp);
      return hp;
    });

    this.ray = new THREE.Raycaster();
    this.origin = new THREE.Vector3(); this.dir = new THREE.Vector3();
    this.candidate = -1; this.since = 0; this.armed = 0;
    this.flashRow = -1; this.flashT = 0;

    const sceneEl = this.el.sceneEl;
    sceneEl.addEventListener('triggerdown', function () { self.instantActivate(); });
    window.addEventListener('click', function (e) {
      if (e.target && e.target.tagName === 'CANVAS') self.instantActivate();
    });

    this.render();
  },
  rowY: function (i) { return 0.115 - i*0.062; },

  instantActivate: function () {
    const cam = this.el.sceneEl.camera;
    if (!cam) return;
    cam.getWorldPosition(this.origin);
    cam.getWorldDirection(this.dir);
    this.ray.set(this.origin, this.dir);
    const hits = this.ray.intersectObjects(this.rowMeshes, false);
    if (!hits.length) return;
    const idx = this.rowMeshes.indexOf(hits[0].object);
    if (idx >= 0) this.activate(idx);
  },
  activate: function (idx) {
    const S = window.RFX;
    if (!S) return;
    this.ROWS[idx].run(S);
    this.flashRow = idx; this.flashT = 260;
    this.armed = 0; this.candidate = -1;
    this.render();
  },

  tick: function (time, dt) {
    const S = window.RFX;
    if (!S) return;
    if (this.flashT > 0) { this.flashT -= (dt||16); if (this.flashT<=0) { this.flashRow=-1; this.render(); } }

    const cam = this.el.sceneEl.camera;
    let gazeIdx = -1;
    if (cam) {
      cam.getWorldPosition(this.origin);
      cam.getWorldDirection(this.dir);
      this.ray.set(this.origin, this.dir);
      const hits = this.ray.intersectObjects(this.rowMeshes, false);
      if (hits.length) gazeIdx = this.rowMeshes.indexOf(hits[0].object);
    }
    if (gazeIdx !== this.candidate) { this.candidate = gazeIdx; this.since = time; this.armed = 0; }
    let progress = 0;
    if (gazeIdx >= 0) {
      this.armed = time - this.since;
      progress = clamp(this.armed / CONFIG.uiDwellMs, 0, 1);
      if (this.armed > CONFIG.uiDwellMs) { this.activate(gazeIdx); return; }
    }
    if (gazeIdx >= 0 && (!this._lastDraw || time - this._lastDraw > 90)) {
      this._lastDraw = time;
      this.render(gazeIdx, progress);
    } else if (gazeIdx < 0 && this._prevGazeIdx >= 0) {
      this.render();
    }
    this._prevGazeIdx = gazeIdx;

    if (!this._lastFull || time - this._lastFull > 400) { this._lastFull = time; this.render(gazeIdx, progress); }
  },

  render: function (hoverIdx, hoverProg) {
    const S = window.RFX; if (!S) return;
    const ctx = this.panel.ctx, cv = this.panel.cv, W = cv.width, H = cv.height;
    const PW = this.panel.w, PH = this.panel.h;   // metres, for fraction math matching hit-planes
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = 'rgba(2,10,7,0.94)';
    roundRect(ctx,4,4,W-8,H-8,20); ctx.fill();
    ctx.strokeStyle = '#2dffa0'; ctx.lineWidth = 5; ctx.stroke();

    ctx.textBaseline='middle'; ctx.textAlign='center';
    ctx.fillStyle = '#2dffa0';
    ctx.font = 'bold ' + Math.round(H*0.062) + 'px ui-monospace, monospace';
    ctx.fillText('CONTROL HUB', W/2, H*0.075);
    ctx.fillStyle = '#7fae9c';
    ctx.font = Math.round(H*0.036) + 'px ui-monospace, monospace';
    ctx.fillText('gaze + hold, or pull trigger', W/2, H*0.128);

    // center divider between the two columns
    ctx.strokeStyle = 'rgba(45,255,160,0.18)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(W/2, H*0.16); ctx.lineTo(W/2, H*0.80); ctx.stroke();

    const cellW = 0.29/PW * W, cellH = 0.062/PH * H;   // matches hit-plane size exactly
    for (let i=0;i<this.ROWS.length;i++){
      const row = this.ROWS[i];
      const xm = row.col===0 ? -0.155 : 0.155;
      const ym = 0.115 - row.row*0.062;
      const cx = W*(0.5 + xm/PW), cy = H*(0.5 - ym/PH);
      const isHover = i === hoverIdx;
      const isFlash = i === this.flashRow;

      if (isFlash) {
        ctx.fillStyle = 'rgba(255,180,84,0.35)';
        roundRect(ctx, cx-cellW/2, cy-cellH/2, cellW, cellH, 8); ctx.fill();
      } else if (isHover) {
        ctx.fillStyle = 'rgba(45,255,160,0.10)';
        roundRect(ctx, cx-cellW/2, cy-cellH/2, cellW, cellH, 8); ctx.fill();
        if (hoverProg > 0.01) {
          ctx.fillStyle = 'rgba(45,255,160,0.32)';
          roundRect(ctx, cx-cellW/2, cy-cellH/2, cellW*hoverProg, cellH, 8); ctx.fill();
        }
      }
      const val = row.get(S);
      ctx.textAlign='left'; ctx.fillStyle = isHover ? '#eafff6' : '#cfe6dc';
      ctx.font = 'bold ' + Math.round(H*0.034) + 'px ui-monospace, monospace';
      ctx.fillText(row.label, cx-cellW/2+6, cy-cellH*0.18);
      ctx.fillStyle = val[1];
      ctx.font = Math.round(H*0.032) + 'px ui-monospace, monospace';
      ctx.fillText(val[0], cx-cellW/2+6, cy+cellH*0.26);
    }

    const fy = H*0.86;
    ctx.strokeStyle = 'rgba(45,255,160,0.25)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(W*0.06,fy-H*0.02); ctx.lineTo(W*0.94,fy-H*0.02); ctx.stroke();
    if (S.showStatus || this._forceStatus) {
      const st = this.readStatus();
      ctx.textAlign='left'; ctx.fillStyle = st.color;
      ctx.font = 'bold ' + Math.round(H*0.036) + 'px ui-monospace, monospace';
      ctx.fillText(st.line1, W*0.06, fy+H*0.035);
      ctx.textAlign='left'; ctx.fillStyle = '#7fae9c';
      ctx.font = Math.round(H*0.024) + 'px ui-monospace, monospace';
      ctx.fillText(st.line2, W*0.06, fy+H*0.058);
    } else {
      ctx.textAlign='center'; ctx.fillStyle = '#3a5b50';
      ctx.font = Math.round(H*0.024) + 'px ui-monospace, monospace';
      ctx.fillText('debug info hidden', W/2, fy+H*0.04);
    }
    this.panel.tex.needsUpdate = true;
  },

  readStatus: function () {
    const S = window.RFX;
    const worldEl = document.querySelector('#world');
    const al = worldEl && worldEl.components['anchor-lock'];
    let anchor='OFF', track='\u2014', hx='--', hz='--', occ=0;
    const cam = this.el.sceneEl.camera;
    if (cam && worldEl) {
      const v = new THREE.Vector3(); cam.getWorldPosition(v);
      v.sub(worldEl.object3D.position);
      const iq = worldEl.object3D.quaternion.clone().invert();
      v.applyQuaternion(iq);
      hx = v.x.toFixed(2); hz = v.z.toFixed(2);
    }
    if (al) { anchor = al.anchor ? 'LOCKED' : (S.isAR ? 'PENDING' : 'OFF'); track = al.lastPoseOK ? 'OK' : (al.anchor?'LOST':'\u2014'); }
    occ = S.occluderCount || 0;
    this._forceStatus = (anchor === 'PENDING');
    const good = anchor==='LOCKED' && track==='OK';
    return {
      color: good ? '#2dffa0' : (anchor==='PENDING' ? '#ffb454' : '#ff5252'),
      line1: 'ANCHOR ' + anchor + '   TRK ' + track + '   OCC ' + occ,
      line2: 'HEAD ' + hx + '/' + hz + 'm'
    };
  }
});

AFRAME.registerComponent('emitter-source', {
  init: function () {
    const self = this;
    window.RFX = {
      playing:true, speed:1, beams:true, isAR:false, anchored:false,
      gazed:null, claimProgress:0, scale:CONFIG.scale, showStatus:CONFIG.showStatus, arEnterTime:0,
      mode:CONFIG.mode,
      transState:null, transFrom:null, transTo:null, transAlpha:0,
      selectedFormation:'v_shape',
      classLabel:null, classConf:null,
      showOverlay:CONFIG.showOverlay, showTrails:CONFIG.showTrails,
      home: ALL_EMITTERS.map(function (e) { return { pos:e.pos.slice(), vel:e.vel.slice() }; })
    };
    ALL_EMITTERS.forEach(function (e,i) {
      const el = document.createElement('a-entity');
      el.setAttribute('position', e.pos[0] + ' 0 ' + e.pos[2]);
      el.setAttribute('rf-emitter', 'idx: ' + i);
      self.el.appendChild(el);
    });
    setTimeout(function(){ self.el.sceneEl.emit('targets-ready'); }, 400);
  }
});
</script>

<body>
<div id="overlay">
  <h1>RF EMITTER HIGHLIGHTER</h1>
  <p>Standalone Meta Quest Browser &mdash; not over Link.<br>
     One control hub, gaze+hold, trigger, or any click.<br>
     Two demos: BLOBS (static classes) and SWARM (formation classifier).</p>
  <div id="demoBtns">
    <button id="btn-mode">MODE: SWARM</button>
    <button id="btn-formation">FORMATION: V SHAPE</button>
  </div>
  <div class="btns">
    <button id="btn-ar" disabled>ENTER MIXED REALITY</button>
    <button id="btn-vr" disabled>ENTER VR</button>
  </div>
  <div id="diag">checking XR support&hellip;</div>
</div>

<script>
// Flat/desktop controls — work before ever entering XR, so both demos
// and formation selection are reachable on a plain browser tab, not
// only from the in-scene control hub. Same shared state either way.
(function () {
  function wire() {
    if (!window.RFX) { setTimeout(wire, 200); return; }
    const modeBtn = document.getElementById('btn-mode');
    const formBtn = document.getElementById('btn-formation');
    modeBtn.addEventListener('click', function () {
      window.RFX.mode = window.RFX.mode === 'swarm' ? 'blobs' : 'swarm';
    });
    formBtn.addEventListener('click', function () {
      const sc = document.querySelector('a-scene');
      const sp = sc && sc.components['swarm-player'];
      if (!sp || typeof FORMATION_NAMES === 'undefined') return;
      const cur = sp.pendingFormation || sp.formation;
      const idx = FORMATION_NAMES.indexOf(cur);
      sp.selectFormation(FORMATION_NAMES[(idx+1) % FORMATION_NAMES.length]);
      window.RFX.mode = 'swarm';
    });
    setInterval(function () {
      const S = window.RFX;
      modeBtn.textContent = 'MODE: ' + (S.mode==='swarm' ? 'SWARM' : 'BLOBS');
      const sc = document.querySelector('a-scene');
      const sp = sc && sc.components['swarm-player'];
      const name = sp ? (sp.pendingFormation || sp.formation) : 'v_shape';
      formBtn.textContent = 'FORMATION: ' + name.toUpperCase().replace('_',' ') + (S.transState==='transitioning' ? ' \u2026' : '');
    }, 250);
  }
  wire();
})();
</script>
